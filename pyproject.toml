[project]
name = "ty-apm-cli"
version = "0.1.0"
description = "Agent-first CLI for Tingyun APM official APIs"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "httpx>=0.27.0",
  "jsonschema>=4.22.0",
  "pypdf>=4.2.0",
  "typer>=0.12.3",
]

[project.scripts]
ty-apm = "ty_apm_cli.cli:app"

[dependency-groups]
dev = [
  "pytest>=8.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

